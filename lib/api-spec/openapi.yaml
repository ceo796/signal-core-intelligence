openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Signal87 Core API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: documents
    description: Document management
  - name: chat
    description: Document chat and Q&A
  - name: demo
    description: Public, unauthenticated landing-page demo content
  - name: agent
    description: Hybrid cross-document agent queries

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /demo/qa:
    get:
      operationId: getDemoQa
      tags: [demo]
      summary: Curated landing-page Q&A demo, grounded in a real stored document when available
      description: >
        Public (no auth). Returns a curated Q&A exchange for the landing-page
        Document Q&A animation. When the system has at least one successfully
        indexed document, the citation is grounded in that real document (its
        name and a real chunk index); otherwise a fully curated citation is
        returned. The frontend falls back to its own hardcoded content if this
        endpoint is unavailable.
      responses:
        "200":
          description: Demo Q&A content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemoQa"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List all documents
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get a document by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Document deleted
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/{id}/chunks:
    get:
      operationId: getDocumentChunks
      tags: [documents]
      summary: Get all chunks for a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document chunks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Chunk"

  /documents/{id}/original:
    get:
      operationId: getDocumentOriginal
      tags: [documents]
      summary: Download the original uploaded file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Original file bytes
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Document not found or original file not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/{id}/reindex:
    post:
      operationId: reindexDocument
      tags: [documents]
      summary: Re-extract text and re-chunk from the stored original file
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reindex result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReindexResult"
        "404":
          description: Document not found or original file not available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Extraction failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/{id}/chat:
    post:
      operationId: chatWithDocument
      tags: [chat]
      summary: Ask a question about a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatInput"
      responses:
        "200":
          description: Answer with citations and debug info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Document has no readable text to answer from
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/multi-chat:
    post:
      operationId: multiChat
      tags: [chat]
      summary: Ask one question across 2-5 selected documents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MultiChatInput"
      responses:
        "200":
          description: Synthesized answer with grouped citations and verification trace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MultiChatResult"
        "400":
          description: Invalid selection (fewer than 2 or more than 5 documents, or a selected document has no chunks)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: One or more selected documents not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/brief:
    post:
      operationId: generateBrief
      tags: [chat]
      summary: Generate a structured executive brief over 1-5 selected documents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BriefInput"
      responses:
        "200":
          description: Structured brief with citations and verification trace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BriefResult"
        "400":
          description: Invalid selection or brief type (e.g. Comparison Brief with fewer than 2 documents, or a selected document has no chunks)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: One or more selected documents not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /documents/{id}/history:
    get:
      operationId: getChatHistory
      tags: [chat]
      summary: Get chat history for a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Chat history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatMessage"
    delete:
      operationId: clearChatHistory
      tags: [chat]
      summary: Clear chat history for a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: History cleared

  /system/info:
    get:
      operationId: getSystemInfo
      tags: [documents]
      summary: Get backend system information
      responses:
        "200":
          description: System info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemInfo"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [documents]
      summary: Get admin statistics
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /agent/hybrid:
    post:
      operationId: postAgentHybrid
      tags: [agent]
      summary: Hybrid cross-document agent query
      description: >
        Authenticated. Runs a single query across one or more documents,
        retrieves relevant chunks via embedding similarity, synthesizes an
        answer grounded in the retrieved context, and returns citations and a
        verification trace. If documentIds are omitted the agent auto-selects
        from all indexed documents (up to maxDocuments). All documents are
        shared across the authenticated user pool (no per-user ownership).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HybridAgentInput"
      responses:
        "200":
          description: Agent answer with citations and verification trace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HybridAgentResult"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
        "404":
          description: One or more specified documents not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    DemoQa:
      type: object
      required: [question, answer, citationLabel, grounded]
      properties:
        question:
          type: string
        answer:
          type: string
        citationLabel:
          type: string
          description: Display text for the citation chip (e.g. "Acme MSA · Chunk 2").
        sourceDocument:
          type: ["string", "null"]
          description: Real document file name when the citation is grounded, else null.
        grounded:
          type: boolean
          description: True when the citation comes from a real stored document.

    Document:
      type: object
      required: [id, fileName, fileType, uploadedAt, chunkCount, extractionStatus, originalFileAvailable]
      properties:
        id:
          type: integer
        fileName:
          type: string
        fileType:
          type: string
        fileSize:
          type: ["integer", "null"]
        uploadedAt:
          type: string
          format: date-time
        chunkCount:
          type: integer
        extractedTextPreview:
          type: ["string", "null"]
        extractedText:
          type: ["string", "null"]
        extractionStatus:
          type: string
        extractionError:
          type: ["string", "null"]
        storageProvider:
          type: ["string", "null"]
        storageKey:
          type: ["string", "null"]
        originalFileAvailable:
          type: boolean

    Chunk:
      type: object
      required: [id, documentId, chunkIndex, content]
      properties:
        id:
          type: integer
        documentId:
          type: integer
        chunkIndex:
          type: integer
        content:
          type: string

    ReindexResult:
      type: object
      required: [id, fileName, fileType, chunkCount, extractionStatus]
      properties:
        id:
          type: integer
        fileName:
          type: string
        fileType:
          type: string
        chunkCount:
          type: integer
        extractionStatus:
          type: string
        extractedTextPreview:
          type: ["string", "null"]

    ChatInput:
      type: object
      required: [question]
      properties:
        question:
          type: string
          minLength: 1

    Citation:
      type: object
      required: [chunkIndex, content, relevanceScore]
      properties:
        chunkIndex:
          type: integer
        content:
          type: string
        relevanceScore:
          type: number

    DebugInfo:
      type: object
      required:
        - route
        - provider
        - model
        - fallbackUsed
        - documentId
        - chunksSearched
        - chunksRetrieved
        - retrievalLatencyMs
        - llmLatencyMs
        - totalLatencyMs
      properties:
        route:
          type: string
        provider:
          type: string
        model:
          type: string
        fallbackUsed:
          type: boolean
        documentId:
          type: integer
        chunksSearched:
          type: integer
        chunksRetrieved:
          type: integer
        retrievalLatencyMs:
          type: number
        llmLatencyMs:
          type: number
        totalLatencyMs:
          type: number
        errors:
          type: ["string", "null"]

    ChatResponse:
      type: object
      required: [answer, citations, debug]
      properties:
        answer:
          type: string
        citations:
          type: array
          items:
            $ref: "#/components/schemas/Citation"
        debug:
          $ref: "#/components/schemas/DebugInfo"

    MultiChatInput:
      type: object
      required: [documentIds, question]
      properties:
        documentIds:
          type: array
          minItems: 2
          maxItems: 5
          items:
            type: integer
        question:
          type: string
          minLength: 1

    MultiCitation:
      type: object
      required: [citationNumber, documentId, documentName, chunkIndex, content, relevanceScore]
      properties:
        citationNumber:
          type: integer
        documentId:
          type: integer
        documentName:
          type: string
        chunkIndex:
          type: integer
        content:
          type: string
        relevanceScore:
          type: number

    MultiChatDocumentStat:
      type: object
      required: [documentId, documentName, chunksSearched, chunksRetrieved]
      properties:
        documentId:
          type: integer
        documentName:
          type: string
        chunksSearched:
          type: integer
        chunksRetrieved:
          type: integer

    MultiDebugInfo:
      type: object
      required:
        - route
        - provider
        - model
        - fallbackUsed
        - documentIds
        - documentNames
        - documentsSearched
        - chunksSearched
        - chunksRetrieved
        - chunksRetrievedByDocument
        - retrievalLatencyMs
        - llmLatencyMs
        - totalLatencyMs
      properties:
        route:
          type: string
        provider:
          type: string
        model:
          type: string
        fallbackUsed:
          type: boolean
        documentIds:
          type: array
          items:
            type: integer
        documentNames:
          type: array
          items:
            type: string
        documentsSearched:
          type: integer
        chunksSearched:
          type: integer
        chunksRetrieved:
          type: integer
        chunksRetrievedByDocument:
          type: array
          items:
            $ref: "#/components/schemas/MultiChatDocumentStat"
        retrievalLatencyMs:
          type: number
        llmLatencyMs:
          type: number
        totalLatencyMs:
          type: number
        errors:
          type: ["string", "null"]

    MultiChatResult:
      type: object
      required: [answer, citations, debug]
      properties:
        answer:
          type: string
        citations:
          type: array
          items:
            $ref: "#/components/schemas/MultiCitation"
        debug:
          $ref: "#/components/schemas/MultiDebugInfo"

    BriefInput:
      type: object
      required: [documentIds, briefType]
      properties:
        documentIds:
          type: array
          minItems: 1
          maxItems: 5
          items:
            type: integer
        briefType:
          type: string
          enum: [executive_summary, risk, diligence, contract_review, comparison]
        focus:
          type: ["string", "null"]
          maxLength: 500

    BriefSection:
      type: object
      required: [heading, body]
      properties:
        heading:
          type: string
        body:
          type: string

    BriefCitation:
      type: object
      required: [citationNumber, documentId, documentName, chunkIndex, content, relevanceScore]
      properties:
        citationNumber:
          type: integer
        documentId:
          type: integer
        documentName:
          type: string
        chunkIndex:
          type: integer
        content:
          type: string
        relevanceScore:
          type: number

    BriefDebugInfo:
      type: object
      required:
        - route
        - provider
        - model
        - fallbackUsed
        - briefType
        - focusProvided
        - documentIds
        - documentNames
        - documentsSearched
        - chunksSearched
        - chunksRetrieved
        - chunksRetrievedByDocument
        - retrievalLatencyMs
        - llmLatencyMs
        - totalLatencyMs
      properties:
        route:
          type: string
        provider:
          type: string
        model:
          type: string
        fallbackUsed:
          type: boolean
        briefType:
          type: string
        focusProvided:
          type: boolean
        documentIds:
          type: array
          items:
            type: integer
        documentNames:
          type: array
          items:
            type: string
        documentsSearched:
          type: integer
        chunksSearched:
          type: integer
        chunksRetrieved:
          type: integer
        chunksRetrievedByDocument:
          type: array
          items:
            $ref: "#/components/schemas/MultiChatDocumentStat"
        retrievalLatencyMs:
          type: number
        llmLatencyMs:
          type: number
        totalLatencyMs:
          type: number
        errors:
          type: ["string", "null"]

    BriefResult:
      type: object
      required: [briefType, title, sections, citations, debug]
      properties:
        briefType:
          type: string
        title:
          type: string
        sections:
          type: array
          items:
            $ref: "#/components/schemas/BriefSection"
        citations:
          type: array
          items:
            $ref: "#/components/schemas/BriefCitation"
        debug:
          $ref: "#/components/schemas/BriefDebugInfo"

    ChatMessage:
      type: object
      required: [id, documentId, role, content, createdAt]
      properties:
        id:
          type: integer
        documentId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        debug:
          type: ["string", "null"]

    AdminStats:
      type: object
      required: [totalDocuments, totalChunks, totalMessages, documentsByType]
      properties:
        totalDocuments:
          type: integer
        totalChunks:
          type: integer
        totalMessages:
          type: integer
        documentsByType:
          type: array
          items:
            $ref: "#/components/schemas/DocTypeCount"

    DocTypeCount:
      type: object
      required: [fileType, count]
      properties:
        fileType:
          type: string
        count:
          type: integer

    SystemInfo:
      type: object
      required: [framework, nodeVersion, nodeEnv, routes, database, ai, env, fileStorage, fileStorageConfig, chunkConfig]
      properties:
        framework:
          type: string
        nodeVersion:
          type: string
        nodeEnv:
          type: string
        routes:
          type: array
          items:
            type: string
        database:
          type: object
          required: [type, orm, tables]
          properties:
            type:
              type: string
            orm:
              type: string
            tables:
              type: array
              items:
                type: string
        ai:
          type: object
          required: [provider, chatModel, embeddingModel, maxTokens]
          properties:
            provider:
              type: string
            chatModel:
              type: string
            embeddingModel:
              type: string
            maxTokens:
              type: integer
        env:
          type: object
          additionalProperties:
            type: string
        fileStorage:
          type: string
        fileStorageConfig:
          type: object
          required: [provider, bucketConfigured, originalFilesStored, embeddingsPersisted]
          properties:
            provider:
              type: string
            bucketConfigured:
              type: boolean
            originalFilesStored:
              type: boolean
            embeddingsPersisted:
              type: boolean
        chunkConfig:
          type: object
          required: [chunkSizeWords, overlapWords]
          properties:
            chunkSizeWords:
              type: integer
            overlapWords:
              type: integer

    HybridAgentInput:
      type: object
      required: [query]
      properties:
        query:
          type: string
          minLength: 1
          maxLength: 2000
        documentIds:
          type: array
          items:
            type: integer
          maxItems: 10
        mode:
          type: string
          enum: [auto, summarize, compare, extract, diligence]
          default: auto
        maxDocuments:
          type: integer
          minimum: 1
          maximum: 10
          default: 5
        maxChunks:
          type: integer
          minimum: 1
          maximum: 30
          default: 12

    HybridAgentDocumentRef:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string

    HybridAgentCitation:
      type: object
      required: [citationNumber, documentId, documentName, chunkIndex, excerpt, relevanceScore]
      properties:
        citationNumber:
          type: integer
        documentId:
          type: integer
        documentName:
          type: string
        chunkIndex:
          type: integer
        excerpt:
          type: string
        relevanceScore:
          type: number

    HybridAgentTrace:
      type: object
      required: [provider, model, documentsConsidered, chunksConsidered, latencyMs, fallbackUsed]
      properties:
        provider:
          type: string
        model:
          type: string
        documentsConsidered:
          type: integer
        chunksConsidered:
          type: integer
        latencyMs:
          type: number
        fallbackUsed:
          type: boolean

    HybridAgentResult:
      type: object
      required: [answer, mode, documentsUsed, citations, trace]
      properties:
        answer:
          type: string
        mode:
          type: string
        documentsUsed:
          type: array
          items:
            $ref: "#/components/schemas/HybridAgentDocumentRef"
        citations:
          type: array
          items:
            $ref: "#/components/schemas/HybridAgentCitation"
        trace:
          $ref: "#/components/schemas/HybridAgentTrace"

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
