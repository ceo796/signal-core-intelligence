services:
  - type: web
    name: signal87-api
    runtime: node
    plan: starter
    region: oregon
    rootDir: .
    autoDeployTrigger: off
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    disk:
      name: signal87-uploads
      mountPath: /var/data
      sizeGB: 10

  - type: web
    name: signal87-web
    runtime: static
    rootDir: .
    autoDeployTrigger: off
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @workspace/signal87-core run build
    staticPublishPath: artifacts/signal87-core/dist/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
