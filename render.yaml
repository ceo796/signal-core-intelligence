services:
  - type: web
    name: signal87-api
    runtime: node
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    disk:
      name: signal87-api-files
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORAGE_PROVIDER
        value: local
      - key: FILE_STORAGE_DIR
        value: /var/data/uploads
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false

  - type: web
    name: signal87-web
    runtime: static
    rootDir: artifacts/mockup-sandbox
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: signal87-api
          property: host
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
