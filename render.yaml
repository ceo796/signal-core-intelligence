services:
  - type: web
    name: signal87-api
    runtime: node
    plan: starter
    region: oregon
    rootDir: .
    autoDeployTrigger: off
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    disk:
      name: signal87-uploads
      mountPath: /var/data
      sizeGB: 10
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORAGE_PROVIDER
        value: local
      - key: FILE_STORAGE_DIR
        value: /var/data/uploads
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: GEMINI_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GEMINI_VERTEX_LOCATION
        value: us-central1
      - key: AI_PROVIDER_ROUTING_ENABLED
        value: "true"
      - key: AI_PRIMARY_REASONING_PROVIDER
        value: google
      - key: AI_FINAL_FALLBACK_PROVIDER
        value: xai
      - key: AI_FALLBACK_PROVIDER_ORDER
        value: openai
      - key: AI_EMBEDDING_PROVIDER
        value: openai
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: ADMIN_EMAILS
        value: ceo@signal87.ai,mbenezra@erezcapital.io
      - key: STRIPE_TRIAL_DAYS
        value: "14"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_ID_PRO
        sync: false
      - key: STRIPE_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://www.signal87.ai
      - key: APP_BASE_URL
        value: https://signal87-api.onrender.com
      - key: STRIPE_SUCCESS_URL
        value: https://www.signal87.ai/documents?billing=success
      - key: STRIPE_CANCEL_URL
        value: https://www.signal87.ai/pricing?billing=cancelled
      - key: STRIPE_PORTAL_RETURN_URL
        value: https://www.signal87.ai/settings

  - type: web
    name: signal87-web
    runtime: static
    rootDir: .
    autoDeployTrigger: off
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/signal87-core run build
    staticPublishPath: artifacts/signal87-core/dist/public
    envVars:
      - key: BASE_PATH
        value: /
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
