# Signal87 — single-origin production deployment.
# Serves the React SPA and /api/* from one Node process via production-server.mjs.
# See DEPLOYMENT.md for required environment variables and architecture notes.
services:
  - type: web
    name: signal87
    runtime: node
    plan: starter
    region: oregon
    rootDir: .
    autoDeployTrigger: off
    buildCommand: >-
      pnpm install --frozen-lockfile
      && pnpm --filter @workspace/api-server run build
      && pnpm --filter @workspace/signal87-core run build
    startCommand: node --enable-source-maps ./production-server.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: AI_PRIMARY_REASONING_PROVIDER
        value: xai
      - key: STORAGE_PROVIDER
        value: local
      - key: FILE_STORAGE_DIR
        value: /var/data/uploads
    disk:
      name: signal87-uploads
      mountPath: /var/data
      sizeGB: 10