services:
  - type: web
    name: signal87-api
    runtime: node
    plan: starter
    region: oregon
    rootDir: .
    autoDeployTrigger: off
    buildCommand: |
      cat > render-placeholder.mjs <<'EOF'
      import http from "node:http";
      const port = Number(process.env.PORT || 10000);
      const server = http.createServer((req, res) => {
        const path = req.url?.split("?")[0] || "/";
        if (path === "/api/healthz" || path === "/healthz" || path === "/health") {
          res.writeHead(200, { "Content-Type": "application/json; charset=utf-8" });
          res.end(JSON.stringify({ ok: true, service: "signal87-render-placeholder" }));
          return;
        }
        res.writeHead(200, { "Content-Type": "text/plain; charset=utf-8" });
        res.end("Signal87 production is not served from this Render deployment. This placeholder exists only to stop stale deployment failures.\n");
      });
      server.listen(port, () => console.log(`Signal87 Render placeholder listening on ${port}`));
      EOF
    startCommand: node --enable-source-maps ./render-placeholder.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production

  - type: web
    name: signal87-web
    runtime: static
    rootDir: .
    autoDeployTrigger: off
    buildCommand: |
      mkdir -p render-disabled
      cat > render-disabled/index.html <<'EOF'
      <!doctype html>
      <html lang="en">
        <head><meta charset="utf-8"><title>Signal87 Render Placeholder</title></head>
        <body>Signal87 production is not served from this Render deployment. This placeholder exists only to stop stale deployment failures.</body>
      </html>
      EOF
    staticPublishPath: render-disabled
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
